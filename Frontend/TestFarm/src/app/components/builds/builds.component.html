<div >
  <div class="breadcrumb-island">
      <nav class="breadcrumb">
          <div class="breadcrumb-item">
              <a href="#">TestFarm</a>
          </div>
          <app-icon name="chevron-right" class="breadcrumb-separator"></app-icon>
          <div class="breadcrumb-item active">
              Artifacts Definitions
          </div>
      </nav>
  </div>
  <div class="islands-grid">
      <div class="island island-large">
          <button class="btn btn-primary" (click)="addArtifactDefinition()">
            <app-icon name="file-add" style="width:16px;height:16px;"></app-icon>
            Create Artifact Definition
          </button>
          <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
              <div style="flex: 1; min-width: 200px;">
                  <input type="text" id="dataSearch" placeholder="Search..."
                      [(ngModel)]="searchTerm"
                      (input)="onSearchChange($event)"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #e9ecef; border-radius: 8px; background: linear-gradient(315deg, #f8f9fa 0%, #ffffff 100%); font-size: 0.875rem; transition: all 0.2s ease;">
              </div>
          </div>
          <div style="background: linear-gradient(315deg, #f8f9fa 0%, #ffffff 100%); border-radius: 8px; border: 1px solid #e9ecef;">
              <table id="artifactsDefinitionsTable" class="data-table" style="border-collapse: separate; border-spacing: 0;">
                  <thead>
                      <tr>
                          <th class="column-sortable fit-content" data-sort="id"
                            (click)="sortTable('id')">
                              Id
                              <app-icon name="sort" style="width: 12px; height: 12px; display: inline-block; margin-left: 0.5rem; opacity: 0.5;"></app-icon>
                            </th>
                          <th class="column-sortable" data-sort="name"
                          (click)="sortTable('name')">
                              Name
                              <app-icon name="sort" style="width: 12px; height: 12px; display: inline-block; margin-left: 0.5rem; opacity: 0.5;"></app-icon>
                          </th>
                          <th class="column">
                              Tags
                          </th>
                          <th class="column">
                              Latest Version
                          </th>
                          <th class="column fit-content">
                              Actions
                          </th>
                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let row of filteredArtifactsRows"
                        (mouseover)="onRowMouseOver(row, $event)"
                        (mouseout)="onRowMouseOut(row, $event)"
                        (click)="markRowReviewed(row, $event)"
                        (dblclick)="removeRowFromReviewed(row, $event)">
                        <td class="cell">
                           {{row.artifact.Id}}
                        </td>
                        <td class="cell">
                          <a [routerLink]="['/artifacts', row.artifact.Id]" class="row-link">
                          {{row.artifact.Name}}
                          </a>
                        </td>
                        <td class="cell">
                            <span *ngFor="let tag of row.artifact.Tags" style="padding: 0.25rem 0.75rem; margin-right: 0.25rem; background: linear-gradient(315deg, #e9ecef 0%, #f8f9fa 100%); border-radius: 12px; font-size: 0.75rem; font-weight: 600; border: 1px solid #dee2e6;">{{tag}}</span>
                        </td>
                        <td class="cell">
                           {{ row.artifact.LatestBuild?.BuildName || 'N/A' }}
                        </td>
                        <td class="cell">
                            <div class="action-menu-container">
                              <button class="action-menu-trigger" (click)="toggleActionMenu(row, $event)">
                                <app-icon name="dots-vertical" style="width:20px;height:20px;"></app-icon>
                              </button>
                              <div class="action-menu" [class.show]="row === activeMenuRow">
                                <button class="action-menu-item" (click)="onMenuAction('notes', row, $event)">
                                  <app-icon name="note"></app-icon>
                                  Notes
                                </button>
                                <button class="action-menu-item" (click)="onMenuAction('links', row, $event)">
                                  <app-icon name="link"></app-icon>
                                  Links
                                </button>
                                <button class="action-menu-item" (click)="onMenuAction('hide', row, $event)">
                                  <app-icon name="search"></app-icon>
                                  Hide
                                </button>
                                <button class="action-menu-item" (click)="onMenuAction('edit', row, $event)">
                                  <app-icon name="edit-alt"></app-icon>
                                  Edit
                                </button>
                                <button class="action-menu-item" (click)="onMenuAction('remove', row, $event)">
                                  <app-icon name="flask"></app-icon>
                                  Remove
                                </button>
                              </div>
                            </div>
                        </td>
                    </tr>
                  </tbody>
              </table>
          </div>
          <div id="noResults" *ngIf="filteredArtifactsRows.length === 0" style="text-align: center; padding: 2rem; color: #6c757d;">
              <app-icon name="comment" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;"></app-icon>
              <div>{{ searchTerm ? 'No artifacts match your search criteria' : 'No artifacts found' }}</div>
          </div>
      </div>
  </div>
</div>

<app-add-artifact-definition-dialog
  *ngIf="showAddArtifactDefinitionDialog"
  (artifactDefinitionAdded)="artifactDefinitionAdded($event)"
  (artifactDefinitionDialogClosed)="artifactDefinitionDialogClosed()">
</app-add-artifact-definition-dialog>

<app-edit-artifact-definition-dialog
  *ngIf="showEditArtifactDefinitionDialog"
  [artifactDefinition]="artifactDefinitionToEdit"
  (artifactDefinitionChanged)="artifactDefinitionChanged($event)"
  (editArtifactDefinitionDialogClosed)="editArtifactDefinitionDialogClosed()">
</app-edit-artifact-definition-dialog>
